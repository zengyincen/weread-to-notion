name: Read time sync

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions 使用 UTC；00:00 UTC 对应北京时间 08:00。
    - cron: "0 0 * * *"

concurrency:
  group: weread-main-writes-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    name: Generate reading heatmap
    runs-on: ubuntu-latest
    env:
      WEREAD_COOKIE: ${{ secrets.WEREAD_COOKIE }}
      WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
      YEAR: ${{ vars.YEAR }}
      HEATMAP_NAME: ${{ vars.HEATMAP_NAME || secrets.NAME }}
      HEATMAP_BACKGROUND_COLOR: ${{ vars.HEATMAP_BACKGROUND_COLOR || vars.background_color }}
      HEATMAP_EMPTY_COLOR: ${{ vars.HEATMAP_EMPTY_COLOR || vars.dom_color }}
      HEATMAP_LOW_COLOR: ${{ vars.HEATMAP_LOW_COLOR || vars.track_color }}
      HEATMAP_MEDIUM_COLOR: ${{ vars.HEATMAP_MEDIUM_COLOR || vars.special_color }}
      HEATMAP_HIGH_COLOR: ${{ vars.HEATMAP_HIGH_COLOR || vars.special_color2 }}
      HEATMAP_TEXT_COLOR: ${{ vars.HEATMAP_TEXT_COLOR || vars.text_color }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate heatmap/weread.svg
        run: npm run heatmap

      - name: Commit heatmap
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add heatmap/weread.svg

          if git diff --cached --quiet; then
            echo "热力图数据没有变化"
          else
            git commit -m "更新微信读书热力图 [skip ci]"
            git push
          fi
